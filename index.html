<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="icon" type="image/x-icon" href="./icon.png">
    <style>
        @font-face {
    font-family: poppins;
    src: url(./Poppins/Poppins-Regular.ttf);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:poppins;
    background:#f5f5f5;
    padding:20px;
    color: #1F2937;
}

h1{
    text-align:center;
    margin-bottom:15px;
}

hr{
    margin-bottom:30px;
}

.main{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
}

.card1{
    flex:1;
    min-width:250px;
    max-width:600px;
}

.card2{
    flex-shrink:0;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid gray;
    font-size:17px;
    font-family:poppins;
}

#add_btn{
    width:180px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#02131f;
    color:white;
    cursor:pointer;
    font-family:poppins;
    transition:.3s;
}

#add_btn:hover{
    background:#063655;
}

#clearall{
     width:180px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#EF4444;
    color:white;
    cursor:pointer;
    font-family:poppins;
    transition:.3s;
}

.ul{
    width:900px;
    max-width:900px;
    margin:30px auto;
    background:#001010;
    border-radius:20px;
    padding:20px;
    min-height:300px;
}

#lists{
    list-style:none;
}

#lists li{
    background:white;
    color:black;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

.btnmain{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.btnmain span{
    flex:1;
    word-break:break-word;
}

.btnmain h3{
    font-size:18px;
}

.btnmain div{
    display:flex;
    gap:10px;
}

#delete,
#edit{
    border:none;
    color:white;
    border-radius:8px;
    padding:10px 22px;
    cursor:pointer;
    font-family:poppins;
    transition:.3s;
}

#delete{
    background:#EF4444;
}

#delete:hover{
    background:#d63a3a;
}

#edit{
    background:#22C55E
;
}

#edit:hover{
    background:#18b526;
}
p{
    text-align: center;
}
/* =================== */
/* Tablet */
/* =================== */

@media(max-width:768px){

    .main{
        flex-direction:column;
    }

    .card1,
    .card2{
        width:100%;
    }

    #add_btn{
        width:100%;
    }

    .btnmain{
        flex-direction:column;
        align-items:flex-start;
    }

    .btnmain div{
        width:100%;
        justify-content:space-between;
    }

    #delete,
    #edit{
        width:48%;
    }

}

/* =================== */
/* Mobile */
/* =================== */

@media(max-width:480px){

    body{
        padding:15px;
    }

    h1{
        font-size:30px;
    }

    input{
        font-size:16px;
    }

    .ul{
        padding:15px;
    }

    .btnmain h3{
        font-size:16px;
    }

    .btnmain div{
        flex-direction:column;
        width:100%;
    }

    #delete,
    #edit{
        width:100%;
    }

}
    </style>
</head>

<body>

    <h1>To Do List</h1>
    <hr>
    <div class="main">
        <div class="card1">
            <input type="text" placeholder="Enter Task Here"  name="" id="input">
        </div>
        <div class="card2">
            <button id="add_btn" onclick="add_item()">Add task</button>
            <button id="clearall" onclick="clear_all(this)">Clear All</button>
        </div>
    </div>

    <div class="ul">
        
        <ul id="lists">
            
        </ul>
    </div>
        <footer>
        <hr>
        
        <p>&copy; 2026 To Do Web App  | Developed by Muhammad Zain </p>
    </footer>



    <script src="app.js"></script>
</body>

</html
