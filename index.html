<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="icon" type="image/x-icon" href="./icon.png">
    <style>
        @font-face {
            font-family: poppins;
            src: url(./Poppins/Poppins-Regular.ttf);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: poppins;
            background: #f5f5f5;
            padding: 20px;
            color: #1F2937;
        }

        /* Header */
        h1 {
            text-align: center;
            margin-bottom: 15px;
        }

        hr {
            margin-bottom: 30px;
        }

        /* MAIN LAYOUT */
        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            max-width: 900px;
            margin: auto;
        }

        .card1 {
            flex: 1;
            min-width: 250px;
        }

        .card2 {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* INPUT */
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid gray;
            font-size: 17px;
            font-family: poppins;
        }

        /* BUTTONS */
        #add_btn,
        #clearall {
            width: 180px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-family: poppins;
            transition: 0.3s;
        }

        #add_btn {
            background: #02131f;
        }

        #add_btn:hover {
            background: #063655;
        }

        #clearall {
            background: #EF4444;
        }

        /* LIST CONTAINER */
        .ul {
            width: 100%;
            max-width: 900px;
            margin: 30px auto;
            background: #001010;
            border-radius: 20px;
            padding: 20px;
            min-height: 300px;
        }

        #lists {
            list-style: none;
        }

        #lists li {
            background: white;
            color: black;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        /* TASK ROW */
        .btnmain {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btnmain span {
            flex: 1;
            word-break: break-word;
        }

        .btnmain h3 {
            font-size: 18px;
        }

        .btnmain div {
            display: flex;
            gap: 10px;
        }

        /* ACTION BUTTONS */
        #delete,
        #edit {
            border: none;
            color: white;
            border-radius: 8px;
            padding: 10px 22px;
            cursor: pointer;
            font-family: poppins;
            transition: 0.3s;
        }

        #delete {
            background: #EF4444;
        }

        #delete:hover {
            background: #d63a3a;
        }

        #edit {
            background: #22C55E;
        }

        #edit:hover {
            background: #18b526;
        }

        p {
            text-align: center;
        }

        /* =================== */
        /* TABLET */
        /* =================== */
        @media (max-width: 768px) {

            body {
                padding: 15px;
            }

            .main {
                flex-direction: column;
                align-items: stretch;
            }

            .card2 {
                justify-content: space-between;
                width: 100%;
            }

            #add_btn,
            #clearall {
                width: 48%;
            }

            .btnmain {
                flex-direction: column;
                align-items: flex-start;
            }

            .btnmain div {
                width: 100%;
                justify-content: space-between;
            }

            #delete,
            #edit {
                width: 48%;
            }
        }

        /* =================== */
        /* MOBILE */
        /* =================== */
        @media (max-width: 480px) {

            h1 {
                font-size: 26px;
            }

            input {
                font-size: 16px;
            }

            #add_btn,
            #clearall {
                width: 100%;
            }

            .card2 {
                flex-direction: column;
            }

            .btnmain div {
                flex-direction: column;
            }

            #delete,
            #edit {
                width: 100%;
            }

            .ul {
                padding: 15px;
            }

            .btnmain h3 {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <h1>To Do List</h1>
    <hr>
    <div class="main">
        <div class="card1">
            <input type="text" placeholder="Enter Task Here" name="" id="input">
        </div>
        <div class="card2">
            <button id="add_btn" onclick="add_item()">Add task</button>
            <button id="clearall" onclick="clear_all(this)">Clear All</button>
        </div>
    </div>

    <div class="ul">

        <ul id="lists">

        </ul>
    </div>
    <footer>
        <hr>

        <p>&copy; 2026 To Do Web App | Developed by Muhammad Zain </p>
    </footer>



    <script src="app.js"></script>
</body>

</html
